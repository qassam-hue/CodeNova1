<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeNova</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#080b12; --surface:#0d1117; --card:#111827;
  --border:#1f2937; --border2:#374151;
  --accent:#00f5d4; --accent2:#7c3aed; --accent3:#f59e0b;
  --text:#e2e8f0; --muted:#64748b; --danger:#ef4444;
  --glow:rgba(0,245,212,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* ── noise ── */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.35;}

/* ══════════════════ LOGIN PAGE ══════════════════ */
#loginPage{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-box{
  width:100%;max-width:420px;padding:24px;
  animation:fadeUp .6s ease both;
}
.login-logo{
  font-family:'Space Mono',monospace;font-size:1.8rem;
  color:var(--accent);text-align:center;margin-bottom:6px;letter-spacing:-1px;
}
.login-logo span{color:var(--accent2);}
.login-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:36px;}

.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:36px 32px;
}
.tab-row{display:flex;gap:0;margin-bottom:28px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.tab-btn{
  flex:1;padding:10px;background:transparent;border:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:.9rem;
  cursor:pointer;transition:.2s;
}
.tab-btn.active{background:var(--accent);color:#080b12;font-weight:700;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;}
.field input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:.95rem;outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--accent);}

.btn-main{
  width:100%;padding:14px;background:var(--accent);color:#080b12;
  border:none;border-radius:10px;font-family:'Cairo',sans-serif;
  font-weight:700;font-size:1rem;cursor:pointer;margin-top:8px;
  transition:transform .2s,box-shadow .2s;
}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(0,245,212,.35);}
.login-err{color:var(--danger);font-size:.82rem;text-align:center;margin-top:8px;min-height:18px;}

/* ══════════════════ APP SHELL ══════════════════ */
#app{display:none;height:100vh;flex-direction:column;}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:54px;min-height:54px;
  background:rgba(8,11,18,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);z-index:10;
  flex-shrink:0;
}
.topbar-logo{font-family:'Space Mono',monospace;font-size:1.1rem;color:var(--accent);letter-spacing:-1px;}
.topbar-logo span{color:var(--accent2);}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:999px;padding:5px 14px 5px 8px;cursor:pointer;
  transition:.2s;position:relative;
}
.user-pill:hover{border-color:var(--accent);}
.avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:#080b12;font-family:'Space Mono',monospace;
  flex-shrink:0;
}
.user-name{font-size:.85rem;font-weight:600;}
.logout-btn{
  background:transparent;border:none;color:var(--muted);
  font-size:.75rem;cursor:pointer;font-family:'Cairo',sans-serif;
  padding:4px 8px;border-radius:6px;transition:.2s;
}
.logout-btn:hover{color:var(--danger);}

/* ── Nav Tabs ── */
.nav-tabs{
  display:flex;gap:4px;padding:8px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.nav-tab{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:8px;border:none;
  background:transparent;color:var(--muted);
  font-family:'Cairo',sans-serif;font-size:.88rem;
  cursor:pointer;transition:.2s;white-space:nowrap;
}
.nav-tab:hover{background:var(--card);color:var(--text);}
.nav-tab.active{background:var(--card);color:var(--accent);border:1px solid rgba(0,245,212,.2);}
.nav-tab .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Main Content ── */
.main-content{flex:1;overflow:hidden;display:flex;}
.page{display:none;width:100%;height:100%;overflow:hidden;}
.page.active{display:flex;}

/* ══════════════════ CHAT PAGE ══════════════════ */
#chatPage{flex-direction:column;}
.chat-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);flex-shrink:0;
}
.chat-header-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px;}
.online-badge{
  font-size:.72rem;padding:2px 10px;border-radius:999px;
  background:rgba(0,245,212,.1);color:var(--accent);
  border:1px solid rgba(0,245,212,.25);font-family:'Space Mono',monospace;
}
.chat-messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:12px;
}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.own{flex-direction:row-reverse;}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;color:#fff;font-family:'Space Mono',monospace;
}
.msg-bubble{
  max-width:65%;background:var(--card);border:1px solid var(--border);
  border-radius:16px 16px 16px 4px;padding:10px 14px;
}
.msg.own .msg-bubble{
  background:rgba(0,245,212,.1);border-color:rgba(0,245,212,.25);
  border-radius:16px 16px 4px 16px;
}
.msg-sender{font-size:.72rem;color:var(--accent);font-weight:700;margin-bottom:3px;font-family:'Space Mono',monospace;}
.msg.own .msg-sender{text-align:left;color:var(--accent);}
.msg-text{font-size:.9rem;line-height:1.5;word-break:break-word;}
.msg-time{font-size:.68rem;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace;}
.msg.own .msg-time{text-align:left;}

.chat-input-row{
  padding:14px 20px;border-top:1px solid var(--border);
  background:var(--surface);display:flex;gap:10px;flex-shrink:0;
}
.chat-input{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:11px 16px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;
  transition:.2s;resize:none;height:44px;max-height:120px;
}
.chat-input:focus{border-color:var(--accent);}
.send-btn{
  width:44px;height:44px;border-radius:12px;border:none;
  background:var(--accent);color:#080b12;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 16px rgba(0,245,212,.4);}

/* ══════════════════ LINKS PAGE ══════════════════ */
#linksPage{flex-direction:column;overflow-y:auto;}
.links-inner{padding:24px;max-width:860px;width:100%;margin:0 auto;}
.page-header{margin-bottom:24px;}
.page-header h2{font-size:1.4rem;font-weight:900;margin-bottom:4px;}
.page-header p{color:var(--muted);font-size:.88rem;}

.add-link-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:24px;
}
.add-link-title{font-size:.85rem;font-family:'Space Mono',monospace;color:var(--accent);margin-bottom:14px;}
.add-link-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.add-link-grid input,.add-link-full input{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;
  transition:.2s;width:100%;
}
.add-link-grid input:focus,.add-link-full input:focus{border-color:var(--accent);}
.add-link-full{margin-bottom:10px;}
.cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.cat-chip{
  padding:5px 14px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.78rem;
  cursor:pointer;transition:.2s;font-family:'Cairo',sans-serif;
}
.cat-chip.selected,.cat-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,245,212,.08);}
.btn-add-link{
  padding:10px 24px;background:var(--accent);color:#080b12;
  border:none;border-radius:10px;font-family:'Cairo',sans-serif;
  font-weight:700;font-size:.88rem;cursor:pointer;transition:.2s;
}
.btn-add-link:hover{transform:translateY(-1px);box-shadow:0 0 16px rgba(0,245,212,.3);}

.links-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.filter-chip{
  padding:6px 16px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.8rem;
  cursor:pointer;transition:.2s;font-family:'Cairo',sans-serif;
}
.filter-chip.active,.filter-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,245,212,.08);}

.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.link-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:18px;transition:.25s;
  display:flex;flex-direction:column;gap:10px;position:relative;
}
.link-card:hover{border-color:rgba(0,245,212,.3);transform:translateY(-2px);}
.link-card-top{display:flex;align-items:center;gap:10px;}
.link-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.link-info{flex:1;min-width:0;}
.link-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-cat{font-size:.72rem;font-family:'Space Mono',monospace;margin-top:2px;}
.link-desc{color:var(--muted);font-size:.82rem;line-height:1.5;}
.link-footer{display:flex;align-items:center;justify-content:space-between;}
.link-by{font-size:.72rem;color:var(--muted);}
.link-open{
  padding:6px 14px;border-radius:8px;background:rgba(0,245,212,.1);
  border:1px solid rgba(0,245,212,.25);color:var(--accent);
  font-size:.78rem;font-family:'Cairo',sans-serif;cursor:pointer;
  text-decoration:none;transition:.2s;
}
.link-open:hover{background:rgba(0,245,212,.2);}
.link-del{
  position:absolute;top:10px;left:12px;background:transparent;border:none;
  color:var(--border2);cursor:pointer;font-size:.85rem;transition:.2s;
}
.link-del:hover{color:var(--danger);}

/* ══════════════════ MEMBERS PAGE ══════════════════ */
#membersPage{flex-direction:column;overflow-y:auto;}
.members-inner{padding:24px;max-width:760px;width:100%;margin:0 auto;}
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:24px;}
.member-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px 16px;text-align:center;
  transition:.25s;
}
.member-card:hover{border-color:rgba(0,245,212,.3);transform:translateY(-2px);}
.member-avatar{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:700;color:#080b12;
  font-family:'Space Mono',monospace;margin:0 auto 12px;
}
.member-name{font-weight:700;font-size:1rem;margin-bottom:4px;}
.member-role{font-size:.75rem;font-family:'Space Mono',monospace;color:var(--muted);}
.member-joined{font-size:.72rem;color:var(--muted);margin-top:6px;}

/* ══════════════════ SYSTEM MSG ══════════════════ */
.sys-msg{
  text-align:center;color:var(--muted);font-size:.78rem;
  font-family:'Space Mono',monospace;padding:6px 0;
}

/* ══════════════════ EMPTY STATE ══════════════════ */
.empty-state{
  text-align:center;padding:60px 24px;color:var(--muted);
}
.empty-state .emoji{font-size:2.5rem;display:block;margin-bottom:12px;}
.empty-state p{font-size:.9rem;line-height:1.6;}

/* ══════════════════ ANIMATIONS ══════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* responsive */
@media(max-width:600px){
  .add-link-grid{grid-template-columns:1fr;}
  .links-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN PAGE ══════════ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo"><span>[</span>CodeNova<span>]</span></div>
    <div class="login-sub">فريق التعلم التقني · نتعلم سوا 🚀</div>
    <div class="login-card">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">دخول</button>
        <button class="tab-btn" onclick="switchTab('register')">تسجيل جديد</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="field"><label>// اسم المستخدم</label><input type="text" id="loginName" placeholder="اسمك في التيم" autocomplete="off"/></div>
        <div class="field"><label>// كلمة المرور</label><input type="password" id="loginPass" placeholder="••••••"/></div>
        <button class="btn-main" onclick="doLogin()">ادخل للتيم ←</button>
        <div class="login-err" id="loginErr"></div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none">
        <div class="field"><label>// اسم المستخدم</label><input type="text" id="regName" placeholder="اختار اسمك" autocomplete="off"/></div>
        <div class="field"><label>// كلمة المرور</label><input type="password" id="regPass" placeholder="اختار password"/></div>
        <div class="field"><label>// تأكيد كلمة المرور</label><input type="password" id="regPass2" placeholder="كرر password"/></div>
        <button class="btn-main" onclick="doRegister()">سجّل وادخل ←</button>
        <div class="login-err" id="regErr"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" style="display:none;flex-direction:column;height:100vh;">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo"><span>[</span>CodeNova<span>]</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="user-pill">
        <div class="avatar" id="topAvatar">?</div>
        <span class="user-name" id="topName">...</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- Nav Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('chat',this)">
      <span class="dot"></span> دردشة التيم
    </button>
    <button class="nav-tab" onclick="showPage('links',this)">
      🔗 الروابط المهمة
    </button>
    <button class="nav-tab" onclick="showPage('members',this)">
      👥 الأعضاء
    </button>
  </div>

  <!-- Main -->
  <div class="main-content">

    <!-- CHAT -->
    <div class="page active" id="chatPage">
      <div class="chat-header" style="flex-shrink:0;">
        <div class="chat-header-title">
          <span>💬 دردشة CodeNova</span>
        </div>
        <span class="online-badge" id="onlineBadge">• أونلاين</span>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="sys-msg">— مرحبا بتيم CodeNova 🚀 —</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="اكتب رسالتك..." rows="1" onkeydown="chatKeydown(event)"></textarea>
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>

    <!-- LINKS -->
    <div class="page" id="linksPage">
      <div class="links-inner">
        <div class="page-header">
          <h2>🔗 الروابط المهمة</h2>
          <p>شاركوا الروابط المفيدة مع التيم</p>
        </div>

        <!-- Add Link -->
        <div class="add-link-card">
          <div class="add-link-title">// أضف رابط جديد</div>
          <div class="add-link-grid">
            <input type="text" id="linkTitle" placeholder="عنوان الرابط"/>
            <input type="text" id="linkEmoji" placeholder="إيموجي (مثل 📚)"/>
          </div>
          <div class="add-link-full">
            <input type="url" id="linkUrl" placeholder="https://..."/>
          </div>
          <div class="add-link-full">
            <input type="text" id="linkDesc" placeholder="وصف قصير (اختياري)"/>
          </div>
          <div class="cat-row" id="catRow">
            <button class="cat-chip selected" onclick="selectCat(this,'Python')">🐍 Python</button>
            <button class="cat-chip" onclick="selectCat(this,'Git')">🌿 Git</button>
            <button class="cat-chip" onclick="selectCat(this,'CS50')">🎓 CS50</button>
            <button class="cat-chip" onclick="selectCat(this,'ML')">🤖 ML</button>
            <button class="cat-chip" onclick="selectCat(this,'أدوات')">🛠️ أدوات</button>
            <button class="cat-chip" onclick="selectCat(this,'أخرى')">📌 أخرى</button>
          </div>
          <button class="btn-add-link" onclick="addLink()">+ أضف الرابط</button>
        </div>

        <!-- Filter -->
        <div class="links-filter" id="linksFilter">
          <button class="filter-chip active" onclick="filterLinks('all',this)">الكل</button>
          <button class="filter-chip" onclick="filterLinks('Python',this)">🐍 Python</button>
          <button class="filter-chip" onclick="filterLinks('Git',this)">🌿 Git</button>
          <button class="filter-chip" onclick="filterLinks('CS50',this)">🎓 CS50</button>
          <button class="filter-chip" onclick="filterLinks('ML',this)">🤖 ML</button>
          <button class="filter-chip" onclick="filterLinks('أدوات',this)">🛠️ أدوات</button>
          <button class="filter-chip" onclick="filterLinks('أخرى',this)">📌 أخرى</button>
        </div>

        <div class="links-grid" id="linksGrid"></div>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="page" id="membersPage">
      <div class="members-inner">
        <div class="page-header">
          <h2>👥 أعضاء التيم</h2>
          <p>كل من انضم لـ CodeNova</p>
        </div>
        <div class="members-grid" id="membersGrid"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA STORE  (in-memory, shared via closure)
// ══════════════════════════════════════════════
// Seed some initial data so the app feels alive
const DB = {
  users: [
    { name:'Admin', pass:'nova2024', joined: new Date().toLocaleDateString('ar') }
  ],
  messages: [
    { sender:'Admin', text:'يا أهلين بالكل في CodeNova! 🔥 نبدأ رحلتنا من Python', time: fmtTime(new Date()) }
  ],
  links: [
    { id:1, title:'Python Docs', emoji:'🐍', url:'https://docs.python.org', desc:'التوثيق الرسمي لـ Python', cat:'Python', by:'Admin', ts: Date.now() },
    { id:2, title:'CS50 Harvard', emoji:'🎓', url:'https://cs50.harvard.edu', desc:'كورس CS50 المجاني من Harvard', cat:'CS50', by:'Admin', ts: Date.now()-1000 },
    { id:3, title:'Pro Git Book', emoji:'🌿', url:'https://git-scm.com/book', desc:'كتاب Git المجاني والشامل', cat:'Git', by:'Admin', ts: Date.now()-2000 },
  ]
};

let currentUser = null;
let selectedCat  = 'Python';
let filterCat    = 'all';
let linkIdSeq    = 10;

function fmtTime(d){ return d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}); }
function initials(n){ return n.slice(0,2).toUpperCase(); }

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').style.display   = tab==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display= tab==='register' ? '' : 'none';
  document.getElementById('loginErr').textContent='';
  document.getElementById('regErr').textContent='';
}

function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const user = DB.users.find(u=>u.name.toLowerCase()===name.toLowerCase()&&u.pass===pass);
  if(!user){ document.getElementById('loginErr').textContent='❌ اسم أو كلمة المرور غلط!'; return; }
  enterApp(user);
}

function doRegister(){
  const name = document.getElementById('regName').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2= document.getElementById('regPass2').value;
  const err  = document.getElementById('regErr');
  if(name.length<2){err.textContent='❌ الاسم قصير جداً'; return;}
  if(pass.length<4){err.textContent='❌ الـ password يكون 4 أحرف على الأقل'; return;}
  if(pass!==pass2){err.textContent='❌ كلمتا المرور مش متطابقتين'; return;}
  if(DB.users.find(u=>u.name.toLowerCase()===name.toLowerCase())){err.textContent='❌ الاسم مأخوذ، اختار غيره'; return;}
  const newUser={ name, pass, joined: new Date().toLocaleDateString('ar') };
  DB.users.push(newUser);
  DB.messages.push({ sender:'System', text:`🎉 ${name} انضم لتيم CodeNova!`, time:fmtTime(new Date()), sys:true });
  enterApp(newUser);
}

function enterApp(user){
  currentUser = user;
  document.getElementById('loginPage').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('topAvatar').textContent=initials(user.name);
  document.getElementById('topName').textContent=user.name;
  renderChat(); renderLinks(); renderMembers();
  scrollChatBottom();
}

function doLogout(){
  currentUser=null;
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginName').value='';
  document.getElementById('loginPass').value='';
}

// ══════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════
function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(id+'Page').classList.add('active');
  btn.classList.add('active');
  if(id==='members') renderMembers();
}

// ══════════════════════════════════════════════
//  CHAT
// ══════════════════════════════════════════════
function renderChat(){
  const el=document.getElementById('chatMessages');
  el.innerHTML='<div class="sys-msg">— مرحبا بتيم CodeNova 🚀 —</div>';
  DB.messages.forEach(m=>{
    if(m.sys){ el.innerHTML+=`<div class="sys-msg">${m.text}</div>`; return; }
    const own=m.sender===currentUser.name;
    el.innerHTML+=`
      <div class="msg${own?' own':''}">
        <div class="msg-avatar">${initials(m.sender)}</div>
        <div class="msg-bubble">
          ${!own?`<div class="msg-sender">${m.sender}</div>`:''}
          <div class="msg-text">${escHtml(m.text)}</div>
          <div class="msg-time">${m.time}</div>
        </div>
      </div>`;
  });
  scrollChatBottom();
}

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  DB.messages.push({ sender:currentUser.name, text, time:fmtTime(new Date()) });
  inp.value=''; inp.style.height='44px';
  renderChat();
}

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
}

function scrollChatBottom(){
  const el=document.getElementById('chatMessages');
  setTimeout(()=>{ el.scrollTop=el.scrollHeight; },30);
}

// ══════════════════════════════════════════════
//  LINKS
// ══════════════════════════════════════════════
const catColors={ Python:'rgba(74,222,128,.12)', Git:'rgba(52,211,153,.1)', CS50:'rgba(245,158,11,.1)', ML:'rgba(167,139,250,.1)', 'أدوات':'rgba(96,165,250,.1)', 'أخرى':'rgba(148,163,184,.1)' };
const catText  ={ Python:'#4ade80', Git:'#34d399', CS50:'#f59e0b', ML:'#a78bfa', 'أدوات':'#60a5fa', 'أخرى':'#94a3b8' };

function selectCat(btn,cat){
  document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selectedCat=cat;
}

function addLink(){
  const title=document.getElementById('linkTitle').value.trim();
  const url  =document.getElementById('linkUrl').value.trim();
  const emoji=document.getElementById('linkEmoji').value.trim()||'🔗';
  const desc =document.getElementById('linkDesc').value.trim();
  if(!title||!url){ alert('الاسم والرابط مطلوبين!'); return; }
  DB.links.unshift({ id:++linkIdSeq, title, emoji, url, desc, cat:selectedCat, by:currentUser.name, ts:Date.now() });
  document.getElementById('linkTitle').value='';
  document.getElementById('linkUrl').value='';
  document.getElementById('linkEmoji').value='';
  document.getElementById('linkDesc').value='';
  renderLinks();
}

function filterLinks(cat,btn){
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filterCat=cat; renderLinks();
}

function deleteLink(id){
  const i=DB.links.findIndex(l=>l.id===id); if(i>-1) DB.links.splice(i,1); renderLinks();
}

function renderLinks(){
  const grid=document.getElementById('linksGrid');
  const list=filterCat==='all'?DB.links:DB.links.filter(l=>l.cat===filterCat);
  if(!list.length){ grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><span class="emoji">🔗</span><p>ما في روابط بعد.<br/>كن الأول وأضف رابط مفيد!</p></div>`; return; }
  grid.innerHTML=list.map(l=>`
    <div class="link-card">
      <button class="link-del" onclick="deleteLink(${l.id})" title="احذف">✕</button>
      <div class="link-card-top">
        <div class="link-icon" style="background:${catColors[l.cat]||catColors['أخرى']}">${l.emoji}</div>
        <div class="link-info">
          <div class="link-title">${escHtml(l.title)}</div>
          <div class="link-cat" style="color:${catText[l.cat]||catText['أخرى']}">${l.cat}</div>
        </div>
      </div>
      ${l.desc?`<div class="link-desc">${escHtml(l.desc)}</div>`:''}
      <div class="link-footer">
        <span class="link-by">بواسطة ${escHtml(l.by)}</span>
        <a class="link-open" href="${escHtml(l.url)}" target="_blank" rel="noopener">فتح ↗</a>
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
//  MEMBERS
// ══════════════════════════════════════════════
function renderMembers(){
  const grid=document.getElementById('membersGrid');
  grid.innerHTML=DB.users.map((u,i)=>`
    <div class="member-card">
      <div class="member-avatar">${initials(u.name)}</div>
      <div class="member-name">${escHtml(u.name)}</div>
      <div class="member-role" style="color:${i===0?'#f59e0b':'var(--accent)'}">${i===0?'// Admin':'// Member'}</div>
      <div class="member-joined">انضم: ${u.joined}</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// enter via Enter key in login
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('loginForm').style.display!=='none'&&document.activeElement.closest('#loginForm')) doLogin();
    if(document.getElementById('registerForm').style.display!=='none'&&document.activeElement.closest('#registerForm')) doRegister();
  }
});

// Auto-grow textarea
document.getElementById('chatInput').addEventListener('input',function(){
  this.style.height='44px';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
</script>
</body>
</html>
